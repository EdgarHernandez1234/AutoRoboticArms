version: '3.8'

# =====================================================================
# ISOLATED CONTAINER NETWORKS (Jax's Security Perimeters)
# =====================================================================
networks:
  public-web-facing:
    driver: bridge
    description: "External bridge allowing user dashboards to view frontend panels."
  private-backplane:
    driver: bridge
    internal: true
    description: "Strictly isolated internal network blocking lateral entry paths."

# =====================================================================
# SYSTEM MICROSERVICES
# =====================================================================
services:
  conductor-orchestrator:
    image: conductor-core:v1
    container_name: robotics_conductor_runtime
    restart: unless-stopped
    
    # 🛠️ Elena's Hardware Pass-Through Gate
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
      
    # 🚀 Jax's Secret Mount Injection Interface
    volumes:
      - /home/${USER}/keys/gcp_key.json:/etc/secrets/gcp_key.json:ro
      
    # Dynamic Environment Variables Configuration
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/secrets/gcp_key.json
      - PYTHONUNBUFFERED=1
      
    # Bind microservice to both networks to allow proxy web traversal
    networks:
      - public-web-facing
      - private-backplane
      
    # Standard health-check parameter blocks
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s = socket.socket(); s.connect((\"127.0.0.1\", 8050))'"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard-launcher:
    image: nginx:alpine
    container_name: homelab_portal_gateway
    restart: unless-stopped
    
    # Expose only the frontend gateway onto your local home Wi-Fi
    ports:
      - "80:80"
      
    # Map configuration files to link launcher directly to FastAPI ports
    volumes:
      - ./nginx_gateway.conf:/etc/nginx/nginx.conf:ro
      
    networks:
      - public-web-facing
      
    depends_on:
      conductor-orchestrator:
        condition: service_healthy