[pytest]
minversion = 8.0
addopts = -v --tb=short
# 1. Direct Anchor: Force pytest to immediately look here and nowhere else
testpaths = tests
# 2. Strict Naming Enforcements: Match only explicit Python test scripts
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# 3. Perimeter Blacklist: Explicitly block pytest from ever entering these sub-trees
norecursedirs = 
    .git
    build
    cmake-build-debug
    firmware_core
    .pytest_cache
    __pycache__