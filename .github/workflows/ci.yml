name: Hardware Layer Defensive Core Automation Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  firmware-hardening-validation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Directory Trees
      uses: actions/checkout@v4

    - name: Initialize Bare-Metal Cross Compiler Environment
      run: sudo apt-get update && sudo apt-get install -y g++ gcc-avr avr-libc

    - name: Run Static Analyzer & Code Safety Scanners
      run: |
        # Verifies code is free of uninitialized fields or dynamic allocations
        g++ -Wall -Wextra -Werror -std=c++11 -fsyntax-only ./Hardware/firmware/src/*.cpp

    - name: Build Automated Integration Test Executable Image
      run: |
        g++ -Wall -O2 -std=c++11 \
          ./Hardware/firmware/tests/test_firmware_core.cpp \
          ./Hardware/firmware/src/circular_buffer.cpp \
          ./Hardware/firmware/src/packet_parser.cpp \
          ./Hardware/firmware/src/watchdog_interlock.cpp \
          -o ./Hardware/firmware/build/test_firmware_core

    - name: Execute Non-Blocking Micro-Clock Simulations
      run: ./Hardware/firmware/build/test_firmware_core